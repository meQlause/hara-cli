name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          # Create tarball
          cd target/${{ matrix.platform.target }}/release
          tar czvf ../../../hara-${{ matrix.platform.name }}.tar.gz hara
          cd ../../../
          
          # Install and run cargo-deb
          cargo install cargo-deb
          cargo deb --target ${{ matrix.platform.target }} -o hara.deb

      - name: Package (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target\${{ matrix.platform.target }}\release\hara.exe -DestinationPath hara-${{ matrix.platform.name }}.zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hara-${{ matrix.platform.name }}.tar.gz
            hara.deb
            hara-${{ matrix.platform.name }}.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
